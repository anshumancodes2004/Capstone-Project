<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Area - Online Examination System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_login.css') }}">
</head>
<body>
    <div class="mesh-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="login-wrapper">
        <div class="glass-panel admin-panel">
            
            <div class="security-badge">
                <span class="pulse-dot"></span> RESTRICTED AREA
            </div>

            <div class="card-header">
                <div class="icon-circle admin-icon">🛡️</div>
                <h2 class="gradient-text admin-title">Admin Control</h2>
                <p class="subtitle">System Administrator Access Only</p>
            </div>

            <form method="POST">
                <div class="input-group">
                    <label for="admin_id">Admin ID</label>
                    <input type="text" id="admin_id" name="admin_id" placeholder="Enter your Admin ID" required>
                </div>

                <div class="input-group">
                    <label for="password">Master Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your Password" required>
                </div>

                <button type="submit" class="login-btn admin-btn">
                    <span>Authenticate Access</span>
                </button>
            </form>

            <div class="footer">
                <a href="/" class="back-link">← Abort & Return to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
