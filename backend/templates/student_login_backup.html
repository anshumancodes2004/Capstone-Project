<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Online Examination System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0e17;
            --container-bg: rgba(16, 25, 40, 0.65);
            --neon-cyan: #00f3ff;
            --neon-teal: #008080;
            --text-main: #ffffff;
            --text-muted: #8892b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Animated Neon Blobs */
        .mesh-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }

        .blob-1 {
            width: 400px; height: 400px;
            background: rgba(0, 243, 255, 0.3);
            top: -100px; left: -100px;
        }

        .blob-2 {
            width: 500px; height: 500px;
            background: rgba(0, 128, 128, 0.3);
            bottom: -150px; right: -100px;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 300px; height: 300px;
            background: rgba(0, 243, 255, 0.2);
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 15s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* Login Wrapper & Glass Panel */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .glass-panel {
            width: 100%;
            max-width: 450px;
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.1), inset 0 0 20px rgba(0, 243, 255, 0.05);
        }

        /* Header Styling */
        .card-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .icon-circle {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            background: rgba(0, 243, 255, 0.1);
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
        }

        .gradient-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: transparent;
            background: linear-gradient(90deg, #fff, var(--neon-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Form Inputs */
        .input-group {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.85rem;
            color: var(--neon-cyan);
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input::placeholder {
            color: rgba(136, 146, 176, 0.5);
        }

        .input-group input:focus {
            background: rgba(0, 243, 255, 0.05);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        /* Submit Button */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-teal));
            border: none;
            border-radius: 30px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.7);
        }

        /* Footer / Back Link */
        .footer {
            margin-top: 25px;
            text-align: center;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
        }
    </style>
</head>
<body>
    <div class="mesh-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card glass-panel">
            <div class="card-header">
                <div class="icon-circle">👨‍🎓</div>
                <h2 class="gradient-text">Student Login</h2>
                <p class="subtitle">Enter your credentials to access exams</p>
            </div>

            <form method="POST">
                <div class="input-group">
                    <label for="admission_no">Admission Number</label>
                    <input type="text" id="admission_no" name="admission_no" placeholder="Enter your Admission Number" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your Password" required>
                </div>

                <button type="submit" class="login-btn">
                    <span>Login</span>
                </button>
            </form>

            <div class="footer">
                <a href="/" class="back-link">← Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
